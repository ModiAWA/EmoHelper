name: Release Mod

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod jars
        run: ./gradlew clean build --stacktrace --refresh-dependencies -PskipModMenu=true

      - name: Prepare release assets
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          mkdir -p release

          MAIN_JAR=$(ls build/libs/*.jar | grep -Ev '(-sources|-javadoc|-dev)' | head -n 1)
          if [ -z "$MAIN_JAR" ]; then
            echo "No main jar found in build/libs"
            exit 1
          fi

          cp "$MAIN_JAR" "release/EmoHelper-${TAG}.jar"

          if ls build/libs/*-sources.jar >/dev/null 2>&1; then
            SRC_JAR=$(ls build/libs/*-sources.jar | head -n 1)
            cp "$SRC_JAR" "release/EmoHelper-${TAG}-sources.jar"
          fi

      - name: Create GitHub release and upload jars
        uses: softprops/action-gh-release@v2
        with:
          name: EmoHelper-${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.jar